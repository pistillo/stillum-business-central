# Porta 8083 in dev per non confliggere con Keycloak (8080).
# In Docker si usa QUARKUS_HTTP_PORT=8080 e mapping host 8083:8080.
quarkus.http.port=8083
%test.quarkus.http.test-port=0

# Base URL Nexus (senza trailing slash) per proxy npm (evita CORS dal browser).
nexus.base-url=${NEXUS_BASE_URL:http://localhost:8070}

# --- CORS (unica origine per il frontend che passa dal gateway) ---
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true
%dev.quarkus.http.cors.origins=http://localhost:5173
%prod.quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
