services:
  postgres:
    image: postgres:16-alpine
    container_name: stillum-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stillum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stillum123}
      POSTGRES_DB: ${POSTGRES_DB:-stillumdb}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stillum-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stillum}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: stillum-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - stillum-net
    healthcheck:
      test: ["CMD-SHELL", "echo ok"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: stillum-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing myminio/stillum-bundles;
      mc mb --ignore-existing myminio/stillum-artifacts;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - stillum-net

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: stillum-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: start-dev --import-realm
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - stillum-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ─── Nexus Repository Manager ──────────────────────────────────────────────
  # backup/nexus è una cartella locale (bind mount) committabile per backup/restore
  nexus:
    image: sonatype/nexus3:latest
    container_name: stillum-nexus
    volumes:
      - nexus-data:/nexus-data
      - ./backup/nexus:/nexus-backup
    networks:
      - stillum-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/service/rest/v1/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ─── APISIX Gateway ────────────────────────────────────────────────────────
  apisix:
    image: apache/apisix:3.9.1-debian
    container_name: stillum-apisix
    ports:
      - "9080:9080"
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      keycloak:
        condition: service_healthy
      nexus:
        condition: service_healthy
    networks:
      - stillum-net
    healthcheck:
      test: ["CMD-SHELL", "apisix version >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  registry-api:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: stillum-registry-api
    working_dir: /workspace
    command: /bin/sh -lc "mvn quarkus:dev -Dquarkus.http.host=0.0.0.0 -Dquarkus.http.port=8081"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-stillum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stillum123}
      POSTGRES_DB: ${POSTGRES_DB:-stillumdb}
      QUARKUS_S3_ENDPOINT_OVERRIDE: http://minio:9000
      QUARKUS_S3_AWS_CREDENTIALS_TYPE: static
      QUARKUS_S3_AWS_CREDENTIALS_STATIC_PROVIDER_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      QUARKUS_S3_AWS_CREDENTIALS_STATIC_PROVIDER_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STILLUM_STORAGE_PUBLIC_S3_ENDPOINT: http://localhost:9080
    volumes:
      - ./registry-api:/workspace
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - stillum-net

  publisher:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: stillum-publisher
    working_dir: /workspace
    command: /bin/sh -lc "mvn quarkus:dev -Dquarkus.http.host=0.0.0.0 -Dquarkus.http.port=8082"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-stillum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stillum123}
      POSTGRES_DB: ${POSTGRES_DB:-stillumdb}
      QUARKUS_S3_ENDPOINT_OVERRIDE: http://minio:9000
      QUARKUS_S3_AWS_CREDENTIALS_TYPE: static
      QUARKUS_S3_AWS_CREDENTIALS_STATIC_PROVIDER_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      QUARKUS_S3_AWS_CREDENTIALS_STATIC_PROVIDER_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      NPM_BUILD_SERVICE_HOST: apisix
      NPM_BUILD_SERVICE_PORT: "9080"
    volumes:
      - ./publisher:/workspace
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      registry-api:
        condition: service_started
      apisix:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      npm-build-service:
        condition: service_started
    networks:
      - stillum-net

  npm-build-service:
    image: node:20-bookworm
    container_name: stillum-npm-build-service
    working_dir: /workspace
    command: /bin/sh -lc "npm install && npm run dev"
    environment:
      PORT: "8090"
      NEXUS_URL: http://nexus:8081
      NEXUS_NPM_REGISTRY_URL: http://nexus:8081/repository/npm-hosted/
      NEXUS_NPM_GROUP_URL: http://nexus:8081/repository/npm-group/
      NEXUS_USERNAME: ${NEXUS_USERNAME:-admin}
      NEXUS_PASSWORD: ${NEXUS_PASSWORD:?Set NEXUS_PASSWORD (docker exec stillum-nexus cat /nexus-data/admin.password)}
      BUILD_TEMP_DIR: /tmp/stillum-builds
      BUILD_TIMEOUT_MS: "120000"
      BUILD_MAX_CONCURRENT: "4"
    volumes:
      - ./npm-build-service:/workspace
      - npm-build-node-modules:/workspace/node_modules
    depends_on:
      nexus:
        condition: service_healthy
    networks:
      - stillum-net



  portal-ui:
    image: node:20-bookworm
    container_name: stillum-portal-ui
    working_dir: /workspace
    command: /bin/sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      NPM_TOKEN: ${NPM_TOKEN}
      VITE_OIDC_CLIENT_ID: portal-ui
    volumes:
      - ./portal-ui:/workspace
      - portal-ui-node-modules:/workspace/node_modules
    depends_on:
      apisix:
        condition: service_healthy
      registry-api:
        condition: service_started
      publisher:
        condition: service_started
      stillum-theia:
        condition: service_started
    networks:
      - stillum-net

networks:
  stillum-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  nexus-data:
  maven-cache:
  npm-build-node-modules:
  portal-ui-node-modules:
